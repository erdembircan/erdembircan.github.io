<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 10" shape-rendering="crispEdges">
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-0.1;0,0" dur="3s" repeatCount="indefinite"/>
    <!-- Head -->
    <rect fill="#d97757" x="3" y="0" width="12" height="2"/>
    <!-- Eyes row: body segments with gaps for eyes at x=5 and x=12 -->
    <rect fill="#d97757" x="3" y="2" width="2" height="2"/>
    <rect fill="#d97757" x="6" y="2" width="6" height="2"/>
    <rect fill="#d97757" x="13" y="2" width="2" height="2"/>
    <!-- Wide body -->
    <rect fill="#d97757" x="1" y="4" width="16" height="2"/>
    <!-- Tapered body -->
    <rect fill="#d97757" x="3" y="6" width="12" height="2"/>
    <!-- Legs -->
    <rect fill="#d97757" x="4" y="8" width="1" height="2"/>
    <rect fill="#d97757" x="6" y="8" width="1" height="2"/>
    <rect fill="#d97757" x="11" y="8" width="1" height="2"/>
    <rect fill="#d97757" x="13" y="8" width="1" height="2"/>
  </g>
</svg>
